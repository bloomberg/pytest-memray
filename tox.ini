[tox]
envlist =
    py314
    py313
    py312-cov
    py312
    py311
    py310
    py39
    py38
    docs
    lint
requires = tox>=4.4

[testenv]
description =
    Run tests under {basepython}
    cov: with coverage
passenv =
    CI
    PYTEST_*
    VIRTUALENV_*
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
    VIRTUALENV_NO_SETUPTOOLS = true
    VIRTUALENV_NO_WHEEL = true
dependency_groups =
    test
commands =
    make check
allowlist_externals =
    make
package = wheel
wheel_build_env = .pkg

[testenv:py312-cov]
commands =
    make coverage

[testenv:docs]
description = invoke sphinx-build to build the HTML docs
setenv =
    VIRTUALENV_NO_SETUPTOOLS = false
    VIRTUALENV_NO_WHEEL = false
basepython = python3.14
dependency_groups =
    docs
commands =
    make docs

[testenv:lint]
description = lint code in {basepython}
basepython = python3.14
extras =
dependency_groups =
    lint
commands =
    make lint
whitelist_externals =
    make
    prettier

[testenv:release]
description = cut a new release
setenv =
    {[testenv:docs]setenv}
basepython = python3.14
skip_install = true
deps =
    towncrier>=22.12
commands =
    make gen_news VERSION={posargs}

[testenv:dev]
description = generate a development environment
setenv =
    {[testenv:docs]setenv}
basepython = python3.14
dependency_groups =
    docs
    lint
    test
commands =
    python -c 'import sys; print(sys.executable)'
